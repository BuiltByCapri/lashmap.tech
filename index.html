<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LashMap</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #f0ece5; --cream-warm: #ebe6dd;
    --lavender: #b8a9d4; --lavender-light: #d5c9e8;
    --lavender-pale: #ede8f3; --lavender-deep: #7a6b9e;
    --lavender-darker: #5c5080; --blush: #c49aaa;
    --text-dark: #2e2640; --text-mid: #5a4f6b; --text-light: #8a7f9a;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

  /* NAV, HERO, ENTRANCE etc same as before ... */

  /* ─────────────────────────────────────
     BETA WAITLIST MODAL
  ───────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(46,38,64,0.85); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.active { display: flex; }
  .modal-content { background: var(--cream); border-radius: 18px; padding: 48px; max-width: 500px; width: 100%; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
  .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 28px; color: var(--text-light); cursor: pointer; transition: color 0.3s; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { color: var(--text-dark); }
  .modal-content h3 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; font-style: italic; color: var(--text-dark); margin-bottom: 12px; }
  .modal-content p { font-size: 15px; color: var(--text-mid); line-height: 1.7; margin-bottom: 32px; }
  .waitlist-form { display: flex; flex-direction: column; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--lavender-deep); font-weight: 500; }
  .form-group input, .form-group select { padding: 14px 18px; border: 1px solid rgba(184,169,212,0.3); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text-dark); background: #fff; transition: border-color 0.3s; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--lavender-deep); }
  .form-submit { background: var(--lavender-deep); color: #fff; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 2.2px; text-transform: uppercase; padding: 16px; border-radius: 40px; border: none; cursor: pointer; transition: background 0.3s, transform 0.2s; margin-top: 12px; }
  .form-submit:hover { background: var(--lavender-darker); transform: translateY(-1px); }
  .form-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-message { font-size: 14px; padding: 12px; border-radius: 8px; text-align: center; margin-top: 16px; }
  .form-message.success { background: rgba(122,107,158,0.1); color: var(--lavender-deep); }
  .form-message.error { background: rgba(196,154,170,0.1); color: var(--blush); }
</style>
</head>
<body>

<!-- MAIN -->
<div class="main" id="main">

  <!-- NAV, HERO same as before ... -->

  <!-- BETA WAITLIST MODAL -->
  <div class="modal-overlay" id="betaModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeBetaModal()">&times;</button>
      <h3>Join the Beta Waitlist</h3>
      <p>Be among the first to experience AI-powered lash mapping.</p>
      <form class="waitlist-form" id="waitlistForm">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required>
        </div>
        <!-- ADDRESS SECTION -->
        <div class="form-group">
          <label for="street">Street Address</label>
          <input type="text" id="street" name="street" placeholder="Street Address" required>
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="City" required>
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <select id="state" name="state" required>
            <option value="">Select State</option>
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <!-- add all other US states as needed -->
          </select>
        </div>
        <div class="form-group">
          <label for="zip">Zip Code</label>
          <input type="text" id="zip" name="zip" placeholder="Zip Code" required>
        </div>
        <button type="submit" class="form-submit">Join Waitlist</button>
      </form>
    </div>
  </div>

</div>

<script>
function openBetaModal() { document.getElementById('betaModal').classList.add('active'); }
function closeBetaModal() { document.getElementById('betaModal').classList.remove('active'); }
</script>

</body>
</html>
